name: Update RBI feed data

on:
  schedule:
    # Once daily at 9:00 AM IST (3:30 AM UTC). Run `npm run fetch` locally anytime
    # for an on-demand refresh.
    - cron: "30 3 * * *"
  workflow_dispatch: {} # lets you trigger a manual refresh from the Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/**"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest compliance data
        run: npm run fetch
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Commit updated data
        run: |
          git config user.name "regnote-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/master-directions.json data/sebi-regulations.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: refresh compliance data [skip ci]"
          git push
